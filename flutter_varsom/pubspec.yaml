name: flutter_varsom
description: Cross-platform Flutter version of the Varsom avalanche forecast app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^8.2.2
  flutter_local_notifications: ^19.0.0
  geolocator: ^13.0.2
  http: ^1.2.2
  intl: ^0.20.2
  latlong2: ^0.9.1
  shared_preferences: ^2.3.3
  timezone: ^0.10.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
